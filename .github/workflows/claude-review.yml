name: Claude Review

on:
  pull_request:
    types: [opened, reopened, ready_for_review]

jobs:
  review:
    # Own-repo, non-draft PRs only: fork PRs can't read the OAuth secret, so a
    # review there would just fail auth.
    if: >
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
      # The action exchanges an OIDC token for its GitHub token.
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Claude review
        uses: anthropics/claude-code-action@ba0aafd4308cbba7165f9f2cdb0cfbed5a3c99ce  # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: "https://github.com/anthropics/claude-code.git"
          plugins: "code-review@claude-code-plugins"
          prompt: "/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}"
          claude_args: "--model claude-opus-4-8"
          # display_report only surfaces the report on the Actions job
          # summary; track_progress is what posts a visible PR comment
          # (progress + final report), so a clean review still responds.
          display_report: "true"
          track_progress: "true"
