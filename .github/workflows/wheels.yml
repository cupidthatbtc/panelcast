# Wheel-install matrix (#299): prove the shipped wheel installs and runs on a
# clean environment for every supported OS / Python pair — no checkout, no
# editable install, no pixi. Exact pixi/GPU reproduction stays a separate path
# (pixi.lock + docs/GPU_SETUP.md); this matrix covers the plain-pip user.
name: Wheels

on:
  workflow_dispatch:
  schedule:
    - cron: "30 6 * * *"  # daily, after nightly
  pull_request:
    paths:
      - pyproject.toml
      - .github/workflows/wheels.yml

# A superseded push must not keep a 10-lane cross-OS matrix running.
concurrency:
  group: wheels-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-wheel:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5
        with:
          python-version: "3.12"

      - name: Build and validate distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build
          python -m twine check dist/*

      - name: Upload wheel
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: wheel-${{ github.sha }}
          path: dist/*.whl
          if-no-files-found: error
          retention-days: 1

  wheel-install:
    # Every lane installs the same built wheel into a fresh venv (never the
    # source tree), imports panelcast, and runs the CPU demo from an empty
    # directory using only the wheel's bundled data.
    needs: build-wheel
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
        experimental: [false]
        include:
          # Expected-but-not-yet-tested lane: 3.14 pip wheels for the JAX stack
          # are still stabilizing (the pixi environment already runs 3.14).
          - os: ubuntu-latest
            python-version: "3.14"
            experimental: true
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Download wheel
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16  # v4
        with:
          name: wheel-${{ github.sha }}
          path: dist

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install the wheel into a fresh environment
        shell: bash
        run: |
          python -m venv wheel-env
          if [ -x wheel-env/bin/python ]; then
            bindir="$PWD/wheel-env/bin"
          else
            bindir="$PWD/wheel-env/Scripts"
          fi
          echo "VENV_BIN=$bindir" >> "$GITHUB_ENV"
          "$bindir/python" -m pip install --upgrade pip
          "$bindir/python" -m pip install dist/*.whl

      - name: Import panelcast
        shell: bash
        run: |
          "$VENV_BIN/python" -c "import panelcast; print(panelcast.__version__)"

      - name: Run the CPU demo from an empty directory
        shell: bash
        run: |
          mkdir demo-dir
          cd demo-dir
          JAX_PLATFORMS=cpu "$VENV_BIN/panelcast" demo \
            --num-chains 1 --num-samples 50 --num-warmup 50
