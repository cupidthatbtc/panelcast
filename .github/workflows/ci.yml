name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Install pixi
        uses: prefix-dev/setup-pixi@ba3bb36eb2066252b2363392b7739741bb777659  # v0.8.1
        with:
          cache: true

      - name: Run linting
        run: pixi run lint

      - name: Type-check boundary modules
        run: pixi run typecheck

      - name: Whole-package typing ratchet
        run: pixi run typecheck-ratchet

  test-fast:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Install pixi
        uses: prefix-dev/setup-pixi@ba3bb36eb2066252b2363392b7739741bb777659  # v0.8.1
        with:
          cache: true

      - name: Run fast unit tests with coverage
        run: pixi run pytest tests/ -m "not slow and not e2e" --cov=src --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238  # v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true

  smoke:
    # Tiny synthetic end-to-end (panelcast demo shape) on every PR and main push.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Install pixi
        uses: prefix-dev/setup-pixi@ba3bb36eb2066252b2363392b7739741bb777659  # v0.8.1
        with:
          cache: true

      - name: Run end-to-end smoke check
        run: pixi run pytest tests/ -m smoke -q
