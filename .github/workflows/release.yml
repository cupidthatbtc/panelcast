name: Publish release

on:
  push:
    tags: ["v*"]

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Build and validate distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build
          python -m twine check dist/*

      - name: Smoke-test the wheel from an empty directory
        run: |
          python -m venv "$RUNNER_TEMP/wheel-env"
          "$RUNNER_TEMP/wheel-env/bin/pip" install dist/*.whl
          tag_version="${GITHUB_REF_NAME#v}"
          wheel_version="$("$RUNNER_TEMP/wheel-env/bin/python" -c 'import importlib.metadata; print(importlib.metadata.version("panelcast"))')"
          if [[ "$tag_version" != "$wheel_version" ]]; then
            echo "Tag version $tag_version does not match wheel version $wheel_version" >&2
            exit 1
          fi
          mkdir "$RUNNER_TEMP/demo"
          cd "$RUNNER_TEMP/demo"
          JAX_PLATFORMS=cpu "$RUNNER_TEMP/wheel-env/bin/panelcast" demo \
            --num-chains 1 --num-samples 50 --num-warmup 50

      - name: Upload distributions
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: distributions-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/p/panelcast
    permissions:
      contents: read
      # PyPI trusted publishing exchanges this OIDC token in the pinned action below.
      id-token: write
    steps:
      - name: Download validated distributions
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: distributions-${{ github.sha }}
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247  # release/v1
