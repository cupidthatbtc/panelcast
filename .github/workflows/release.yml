name: Publish release

on:
  push:
    tags: ["v*"]

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: pypi
      url: https://pypi.org/p/panelcast
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build
          python -m twine check dist/*

      - name: Smoke-test the wheel from an empty directory
        run: |
          python -m venv "$RUNNER_TEMP/wheel-env"
          "$RUNNER_TEMP/wheel-env/bin/pip" install dist/*.whl
          mkdir "$RUNNER_TEMP/demo"
          cd "$RUNNER_TEMP/demo"
          JAX_PLATFORMS=cpu "$RUNNER_TEMP/wheel-env/bin/panelcast" demo \
            --num-chains 1 --num-samples 50 --num-warmup 50

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247  # release/v1
