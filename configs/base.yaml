# Base pipeline configuration.
#
# Keys mirror PipelineConfig field names and are loadable via
# `panelcast run --config configs/base.yaml`. Every value below equals
# the effective CLI default, so loading this file changes nothing — it exists
# as the documented starting point for custom configs (copy, edit, pass with
# --config; later --config files and explicit CLI options override).
#
# Domain/dataset settings (column names, score bounds, feature blocks, file
# paths) do NOT belong here — they live in a dataset descriptor under
# configs/datasets/ and are selected with --dataset.

# max_albums / target_transform are deliberately unset here (#268): they
# defer to the dataset descriptor, then to the pipeline defaults (50 /
# offset_logit). Restating them would override every descriptor.

seed: 42

# MCMC configuration
num_chains: 4
num_samples: 1000
num_warmup: 1000
target_accept: 0.90
max_tree_depth: 10
chain_method: sequential
caged_chain_retries: 0
caged_chain_tree_depth_fraction: 0.95
caged_chain_boundary_sigma: 0.005
caged_chain_consensus_ratio: 5.0

# Convergence thresholds
rhat_threshold: 1.01
ess_threshold: 400
allow_divergences: false

# Data filtering
min_ratings: 10
min_albums_filter: 2

# Feature ablation (block composition itself comes from the dataset
# descriptor's feature_blocks list; these flags disable ablation groups)
enable_genre: true
enable_artist: true
enable_temporal: true

# Heteroscedastic noise
# Learning n_exponent is unnecessary for AOTY: posterior n_exponent ~= 0.002,
# so review-count noise scaling has negligible effect and costs ~30% compute.
n_exponent: 0.0
learn_n_exponent: false
n_exponent_prior: logit-normal

# Likelihood: Student-t with df=4 gives heavier tails than Normal, reducing
# overprediction for extreme-score albums. Set >= 100 for Normal.
likelihood_df: 4.0

# Model gates (Phase 5/6 adopted decisions; defaults restated).
# offset_logit promoted to default in 0.5.0 (#43): +22 held-out elpd over
# identity on the corrected estimator, stable across seeds.
ar_center: global
latent_process: rw
debut_prev_score_source: train_mean

# Observation-noise gates.
# sigma_obs_prior_type: "lognormal" removes the HalfNormal zero-boundary
#   pile-up (use on heavily zero-inflated targets where sigma_obs collapses);
#   stays off for AOTY (bit-identical to published fits).
# heteroscedastic_entity_obs: per-entity multiplicative noise inflation (wider,
#   better-calibrated intervals for noisy series). Promoted to the AOTY default
#   in 0.13.0 (#238) on the three-seed subset confirmation (held-out ELPD
#   +29.8 +/- 7.0, resolves the q10/q90 PPC pins) under #237's coverage
#   non-inferiority rule. Domains whose bake-offs rejected it (IMDb, econ) pin
#   false. tau_entity_scale is the HalfNormal scale on that entity dispersion.
sigma_obs_prior_type: halfnormal
heteroscedastic_entity_obs: true
tau_entity_scale: 0.25

# Genre/group pooling gate (#41; promoted to auto-on in 0.6.0 on the #85
# screening + publication confirmation). null = auto: on where the descriptor
# names an entity_group_col and the training split has that column, off
# otherwise. Set true/false to force (true hard-fails on unsupported domains).
# On, a zero-sum group offset sits between the global mean and the entity
# effects — new entities from a seen group start at the group level instead
# of the population mean.
entity_group_pooling: null

# Stacked-GBM offset feature block (#86; default on since 0.6.0 — +224 paired
# held-out ELPD over the 0.5.0 baseline with better point accuracy at nominal
# coverage). Appends a gbm_offset column — a gradient-boosted prediction of
# the target from the other blocks' outputs — to X, out-of-fold for train rows
# so no row's own label leaks into its feature. Set false to disable.
gbm_offset: true

# Split configuration
val_albums: 0
min_train_albums: 2

# Evaluation configuration
calibration_intervals: [0.80, 0.95]
coverage_tolerance: 0.03
prediction_interval: 0.95
evaluate_secondary_split: true
